<!DOCTYPE html><html lang='pt-BR'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Missão Lava e Seca Hisense Academy</title><style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');body{margin:0;font-family:Poppins,sans-serif;background:#F4F8FC;color:#1e293b}#wrap{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{background:linear-gradient(180deg,#003B71,#00284D);color:#fff;padding:20px}.side h2{margin:0 0 10px}.menu div{background:rgba(255,255,255,.1);padding:10px;border-radius:12px;margin:8px 0}.main{padding:24px}.card{background:#fff;border-radius:24px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.08)}.progress{height:12px;background:#d9e2ec;border-radius:999px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,#00A9CE,#78BE20);width:0}.btn{background:#003B71;color:#fff;border:none;padding:12px 18px;border-radius:999px;cursor:pointer}.opt{display:block;width:100%;text-align:left;margin:10px 0;padding:14px;background:#fff;border:1px solid #d9e2ec;border-radius:14px;cursor:pointer}.hidden{display:none}.fb{padding:14px;border-radius:12px;background:#eef8ff;margin-top:12px}.badge{background:#00A9CE;color:#fff;padding:4px 10px;border-radius:20px}.score{float:right;font-weight:700}</style></head><body><div id='wrap'><aside class='side'><h2>Hisense Academy</h2><p>Missão Lava e Seca</p><div class='menu'><div>🔍 Não Seca</div><div>💧 Não Centrifuga</div><div>⚖️ Uso x Defeito</div><div>📝 Registro</div><div>🏆 Missão Final</div></div></aside><main class='main'><div class='card'><div id='home'><span class='badge'>Modo Detetive</span><h1>Central de Casos</h1><p>Resolva situações reais de atendimento. Analise o relato, escolha a melhor investigação e acumule pontos.</p><button class='btn' onclick='start()'>Iniciar Missão</button></div><div id='game' class='hidden'><div class='score' id='score'></div><div class='progress'><div id='bar' class='bar'></div></div><h2 id='title'></h2><p id='case'></p><div id='opts'></div><div id='fb' class='fb hidden'></div><button id='next' class='btn hidden' onclick='nextQ()'>Próxima Missão</button></div><div id='end' class='hidden'><h1>🏁 Missão Concluída</h1><p id='res'></p><h2 id='lvl'></h2><button class='btn' onclick='location.reload()'>Jogar Novamente</button></div></div></main></div><script>const qs=[{t:'Caso 1 • Não Seca',c:'Cliente informa: roupas saem quentes e levemente úmidas.',o:['Trocar resistência','Validar nível de secagem','Abrir solicitação','Trocar placa'],a:1,f:'Funções como Ferro podem deixar roupas levemente úmidas.'},{t:'Caso 2 • Investigação',c:'Minha Lava e Seca não seca.',o:['Perguntar se houve centrifugação prévia','Perguntar a cor da máquina','Perguntar operadora de internet','Encerrar contato'],a:0,f:'A centrifugação influencia diretamente a secagem.'},{t:'Caso 3 • Drenagem',c:'Existe água acumulada no cesto.',o:['Investigar drenagem','Trocar painel','Trocar motor','Atualizar aplicativo'],a:0,f:'Água acumulada exige validação da drenagem.'},{t:'Caso 4 • Instalação',c:'Produto pula durante a centrifugação.',o:['Nivelamento e parafusos','Controle sonoro','ConnectLife','Função Ferro'],a:0,f:'Nivelamento e transporte são verificações iniciais.'},{t:'Caso 5 • UNB',c:'Código UNB aparece no painel.',o:['Motor queimado','Desbalanceamento','Falha elétrica','Erro de secagem'],a:1,f:'UNB é alerta de desbalanceamento.'},{t:'Caso 6 • Manutenção',c:'Filtro nunca foi limpo.',o:['Ignorar informação','Relacionar com drenagem','Trocar placa','Trocar mangueira'],a:1,f:'Filtro obstruído pode impactar drenagem e centrifugação.'},{t:'Caso 7 • F03',c:'F03 e roupas molhadas.',o:['Filtro e mangueira','Temperatura','Display','App'],a:0,f:'F03 está relacionado à drenagem.'},{t:'Caso 8 • Instalação',c:'Mangueira imersa em água.',o:['Normal','Pode gerar retorno de água','Melhora secagem','Sem impacto'],a:1,f:'A imersão pode provocar efeito sifão.'},{t:'Caso 9 • Secagem',c:'Cliente fechou a torneira durante a secagem.',o:['Sem impacto','Pode prejudicar a secagem','Melhora eficiência','Evita erros'],a:1,f:'A torneira deve permanecer aberta.'},{t:'Caso 10 • Registro',c:'WD5Q, F03, água no cesto e roupas molhadas.',o:['Cliente com defeito','Registrar sintoma e verificações realizadas','Trocar produto','Encerrar'],a:1,f:'Registros devem conter sintomas e validações.'},{t:'Missão Final',c:'Roupas molhadas, água no cesto e F03. Qual linha faz mais sentido?',o:['Investigar drenagem','Trocar resistência','Trocar display','Atualizar app'],a:0,f:'Os indícios apontam para drenagem.'}];let i=0,p=0;function start(){home.classList.add('hidden');game.classList.remove('hidden');show()}function show(){score.innerHTML='Pontos: '+p+'/'+i;bar.style.width=(i/qs.length*100)+'%';title.textContent=qs[i].t;case.textContent=qs[i].c;opts.innerHTML='';fb.classList.add('hidden');next.classList.add('hidden');qs[i].o.forEach((x,n)=>{let b=document.createElement('button');b.className='opt';b.textContent=x;b.onclick=()=>ans(n);opts.appendChild(b);});}function ans(n){document.querySelectorAll('.opt').forEach(x=>x.disabled=true);let ok=n===qs[i].a;if(ok)p++;fb.textContent=(ok?'✅ Correto! ':'❌ Atenção! ')+qs[i].f;fb.classList.remove('hidden');next.classList.remove('hidden');}function nextQ(){i++;if(i<qs.length)show();else finish()}function finish(){game.classList.add('hidden');end.classList.remove('hidden');res.innerHTML='Você acertou '+p+' de '+qs.length+' casos.';lvl.innerHTML=p>=9?'🏆 Especialista em Investigação':p>=6?'🥈 Investigador Operacional':'🥉 Revisar Conceitos';}</script></body></html>
